services:
  # Auth Service
  - type: web
    name: auth-service
    env: node
    buildCommand: npm install --prefix services/auth && npm run build --prefix services/auth
    startCommand: node services/auth/dist/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: Mongo_URL
        sync: false
      - key: JWT_SEC
        sync: false
      - key: UPLOAD_SERVICE
        value: "https://utils-service-your-url.onrender.com"
      - key: Frontend_Url
        value: "https://your-vercel-frontend-url.vercel.app"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false

  # User Service
  - type: web
    name: user-service
    env: node
    buildCommand: npm install --prefix services/user && npm run build --prefix services/user
    startCommand: node services/user/dist/index.js
    envVars:
      - key: PORT
        value: 5002
      - key: Mongo_URL
        sync: false
      - key: JWT_SEC
        sync: false
      - key: UPLOAD_SERVICE
        value: "https://utils-service-your-url.onrender.com"
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false

  # Job Service
  - type: web
    name: job-service
    env: node
    buildCommand: npm install --prefix services/job && npm run build --prefix services/job
    startCommand: node services/job/dist/index.js
    envVars:
      - key: PORT
        value: 5003
      - key: Mongo_URL
        sync: false
      - key: JWT_SEC
        sync: false
      - key: UPLOAD_SERVICE
        value: "https://utils-service-your-url.onrender.com"
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false

  # Utils Service (Handles Uploads, AI, and Kafka Consumer)
  - type: web
    name: utils-service
    env: node
    buildCommand: npm install --prefix services/utils && npm run build --prefix services/utils
    startCommand: node services/utils/dist/index.js
    envVars:
      - key: PORT
        value: 5001
      - key: Mongo_URL
        sync: false
      - key: Cloud_Name
        sync: false
      - key: Cloud_Api
        sync: false
      - key: Cloud_Secret
        sync: false
      - key: Gemini_Api
        sync: false
      - key: Gmail_User
        sync: false
      - key: Gmail_Pass
        sync: false
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false

  # Payment Service
  - type: web
    name: payment-service
    env: node
    buildCommand: npm install --prefix services/payment && npm run build --prefix services/payment
    startCommand: node services/payment/dist/index.js
    envVars:
      - key: PORT
        value: 5004
      - key: Mongo_URL
        sync: false
      - key: JWT_SEC
        sync: false
      - key: Razorpay_Key
        sync: false
      - key: Razorpay_Secret
        sync: false
